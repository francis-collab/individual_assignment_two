name: kigali_city_directory
description: "Kigali City Services & Places Directory"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'   # Modern & compatible with current Flutter + packages

dependencies:
  flutter:
    sdk: flutter

  # Firebase packages (updated to latest stable series)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # Google Maps & location
  google_maps_flutter: ^2.5.3
  geolocator: ^13.0.1

  # Navigation launcher
  url_launcher: ^6.3.0

  # State management (Bloc family)
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.0           # Updated to latest

  # iOS-style icons (already there, kept)
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0   # Updated lint version (safer)

flutter:
  uses-material-design: true

  # Uncomment and add if you have custom assets later
  # assets:
  #   - images/logo.png
  #   - images/background.jpg

  # Custom fonts example (uncomment if needed later)
  # fonts:
  #   - family: CustomFont
